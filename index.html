<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twenty Three Agency</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .desktop {
      display: block;
      width: 100%;
    }

    .mobile {
      display: none;
      width: 100%;
    }

    /* Mobile switch */
    @media (max-width: 768px) {
      .desktop {
        display: none;
      }
      .mobile {
        display: block;
      }
    }
  </style>
</head>

<body>

  <img src="23A_Web.png" class="desktop" alt="desktop version">
  <img src="23A_Mobile.png" class="mobile" alt="mobile version">

</body>
</html>
